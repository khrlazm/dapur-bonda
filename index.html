<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Dapur Bonda — Pulut Kuning</title>
    <meta name="description" content="A serial cozy cooking VR sim set in a Malay kampung kitchen." />
    <style>
      :root {
        --paper: #f3e4c4;
        --ink: #4a2f1a;
        --brass: #b08d3f;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #14100b;
        color: var(--ink);
        font-family: "Georgia", "Times New Roman", serif;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* ---- Loading veil ---- */
      #veil {
        position: fixed; inset: 0; z-index: 40;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0.6rem;
        background:
          radial-gradient(120% 80% at 50% 30%, #3a2a17 0%, #201509 70%, #140d05 100%);
        color: var(--paper);
        transition: opacity 1.1s ease;
        text-align: center;
      }
      #veil.hidden { opacity: 0; pointer-events: none; }
      #veil h1 {
        font-size: clamp(2rem, 6vw, 3.4rem);
        letter-spacing: 0.04em;
        margin: 0;
        font-weight: 400;
        text-shadow: 0 2px 18px rgba(0,0,0,0.5);
      }
      #veil .tagline { font-style: italic; opacity: 0.82; margin-top: -0.2rem; }
      #veil .status { margin-top: 1.4rem; font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; }
      #veil .err { color: #ffbfa0; max-width: 32rem; font-size: 0.85rem; line-height: 1.4; }

      /* ---- In-world HUD ---- */
      #hud {
        position: fixed; inset: 0; z-index: 20; pointer-events: none;
        display: flex; flex-direction: column; justify-content: space-between;
        padding: env(safe-area-inset-top, 16px) 18px 18px;
      }
      #hud .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
      #hud .card {
        pointer-events: auto;
        background: linear-gradient(180deg, rgba(243,228,196,0.94), rgba(233,214,176,0.94));
        border: 1px solid rgba(74,47,26,0.35);
        border-radius: 10px;
        padding: 10px 14px;
        color: var(--ink);
        box-shadow: 0 6px 20px rgba(0,0,0,0.28);
        max-width: min(46ch, 78vw);
      }
      #hud .card h2 { margin: 0 0 2px; font-size: 0.95rem; letter-spacing: 0.02em; }
      #hud .card p { margin: 0; font-size: 0.86rem; line-height: 1.35; opacity: 0.9; }
      #hud .step-num { color: var(--brass); font-style: italic; }

      #controls-help {
        align-self: flex-end; text-align: right; font-size: 0.75rem; opacity: 0.85;
      }
      .btn {
        pointer-events: auto;
        font-family: inherit; font-size: 0.82rem;
        background: rgba(243,228,196,0.94); color: var(--ink);
        border: 1px solid rgba(74,47,26,0.4); border-radius: 999px;
        padding: 8px 14px; cursor: pointer; letter-spacing: 0.03em;
        box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      }
      .btn:hover { background: #fff2d6; }
      #hud .bottom { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
      #hud .btns { display: flex; gap: 8px; flex-wrap: wrap; }

      /* three.js VRButton lives here; we restyle it via its own inline styles + this container */
      #xr-slot { pointer-events: auto; }

      #toast {
        position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
        z-index: 25; pointer-events: none;
        background: rgba(20,13,5,0.82); color: var(--paper);
        padding: 10px 18px; border-radius: 999px; font-size: 0.9rem;
        border: 1px solid rgba(176,141,63,0.5);
        opacity: 0; transition: opacity 0.4s ease; max-width: 80vw; text-align: center;
      }
      #toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud" hidden>
      <div class="top">
        <div class="card" id="step-card">
          <h2>Dapur Bonda</h2>
          <p>Loading the kitchen…</p>
        </div>
        <div class="btns" style="pointer-events:none">
          <div class="btns" style="pointer-events:auto">
            <span id="hub-controls" style="display:none">
              <button class="btn" id="btn-prev" title="Previous recipe">◀</button>
              <button class="btn" id="btn-cook" title="Cook the shown recipe">Cook</button>
              <button class="btn" id="btn-next" title="Next recipe">▶</button>
            </span>
            <button class="btn" id="btn-audio" title="Toggle ambient sound">🔈 Sound</button>
            <div id="xr-slot"></div>
          </div>
        </div>
      </div>
      <div class="bottom">
        <div class="card" id="controls-help">
          <strong>Desktop</strong> — Left-drag: reach &amp; grab · Right-drag: look · Wheel: zoom · <kbd>Shift</kbd>+drag held item: tilt to pour
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <div id="veil">
      <h1>Dapur&nbsp;Bonda</h1>
      <div class="tagline">Traditional Malay cooking, one memory at a time.</div>
      <div class="status" id="veil-status">Warming the stove…</div>
      <div class="err" id="veil-err"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
